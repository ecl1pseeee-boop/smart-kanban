# Production overrides — used with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# - Hides internal services from the host (no published ports)
# - Sets NODE_ENV=production
# - Mounts Let's Encrypt cert store and ACME webroot for nginx + certbot
# - Adds a certbot service (used on-demand via `docker compose run --rm certbot ...`)

services:
  postgres:
    ports: []

  redis:
    ports: []

  api:
    ports: []
    environment:
      NODE_ENV: production
      LOG_LEVEL: info

  web:
    ports: []

  nginx:
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_webroot:/var/www/certbot:ro
      - letsencrypt:/etc/letsencrypt:ro

  certbot:
    image: certbot/certbot:latest
    profiles: ['cert']
    volumes:
      - certbot_webroot:/var/www/certbot
      - letsencrypt:/etc/letsencrypt

volumes:
  certbot_webroot:
  letsencrypt:
