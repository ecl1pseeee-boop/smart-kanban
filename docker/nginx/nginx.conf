worker_processes auto;
worker_rlimit_nofile 8192;

events {
  worker_connections 4096;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript
             application/xml+rss application/atom+xml image/svg+xml;
  gzip_min_length 1024;

  client_max_body_size 10m;

  upstream api_backend {
    server api:3001;
  }

  upstream web_frontend {
    server web:80;
  }

  # ── HTTP :80 — ACME challenge + redirect to HTTPS ───────────────
  server {
    listen 80 default_server;
    server_name _;

    # Let's Encrypt webroot challenge — must work over plain HTTP.
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS :443 ──────────────────────────────────────────────────
  server {
    listen 443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/unithack.play2go.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/unithack.play2go.cloud/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # WebSocket / Socket.IO
    location /socket.io/ {
      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 86400s;
      proxy_send_timeout 86400s;
    }

    # REST API
    location /api/ {
      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger
    location /documentation {
      proxy_pass http://api_backend;
      proxy_set_header Host $host;
    }

    # Health probe
    location /health {
      proxy_pass http://api_backend/health;
      access_log off;
    }

    # Frontend SPA
    location / {
      proxy_pass http://web_frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
